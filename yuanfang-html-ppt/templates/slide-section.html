<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; font-family: var(--font-title, Georgia, serif); background: var(--bg, #fff); color: var(--text, #111); width: 10in; height: 5.625in; }
  .section-page { padding: 80px 60px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
  .section-number { font-size: 120pt; color: var(--accent, #4f46e5); font-weight: 700; line-height: 1; opacity: 0.4; }
  .section-title { font-size: 44pt; color: var(--text, #111); font-weight: 700; margin-top: 20px; }
  .section-divider { width: 80px; height: 4px; background: var(--accent, #4f46e5); margin-top: 30px; }
</style>
</head>
<body>
<div class="section-page">
  <div class="section-number">{{SECTION_NUM}}</div>
  <div class="section-title">{{TITLE}}</div>
  <div class="section-divider"></div>
</div>
</body>
</html>
