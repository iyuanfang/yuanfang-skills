<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; font-family: var(--font-body, system-ui); background: var(--bg, #fff); color: var(--text, #111); width: 10in; height: 5.625in; }
  .slide { padding: 50px 60px; height: 100%; box-sizing: border-box; }
  .title { font-size: 28pt; color: var(--text, #111); font-weight: 700; margin-bottom: 40px; }
  .data-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
  .metric-card { background: var(--bg-alt, #f5f5f5); border-radius: 12px; padding: 30px; text-align: center; }
  .metric-label { font-size: 14pt; color: var(--secondary, #666); margin-bottom: 10px; }
  .metric-value { font-size: 36pt; color: var(--text, #111); font-weight: 700; line-height: 1.1; }
  .metric-change { font-size: 14pt; color: var(--accent, #4f46e5); margin-top: 8px; font-weight: 700; }
</style>
</head>
<body>
<div class="slide">
  <h1 class="title">{{TITLE}}</h1>
  <div class="data-grid">{{METRIC_CARDS}}</div>
</div>
</body>
</html>
