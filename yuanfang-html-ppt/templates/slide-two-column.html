<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; font-family: var(--font-body, system-ui); background: var(--bg, #fff); color: var(--text, #111); width: 10in; height: 5.625in; }
  .slide { padding: 50px 60px; height: 100%; box-sizing: border-box; }
  .title { font-size: 28pt; color: var(--text, #111); font-weight: 700; margin-bottom: 40px; }
  .two-col { display: flex; gap: 60px; height: calc(100% - 100px); }
  .col { flex: 1; background: var(--bg-alt, #f5f5f5); border-radius: 12px; padding: 30px; box-sizing: border-box; }
  .col-title { font-size: 22pt; color: var(--accent, #4f46e5); font-weight: 700; margin: 0 0 20px 0; }
  .col-points { font-size: 16pt; line-height: 1.6; color: var(--text, #111); padding-left: 20px; }
  .col-points li { margin-bottom: 8px; }
</style>
</head>
<body>
<div class="slide">
  <h1 class="title">{{TITLE}}</h1>
  <div class="two-col">
    <div class="col col-left">
      <h2 class="col-title">{{LEFT_TITLE}}</h2>
      <ul class="col-points">{{LEFT_POINTS}}</ul>
    </div>
    <div class="col col-right">
      <h2 class="col-title">{{RIGHT_TITLE}}</h2>
      <ul class="col-points">{{RIGHT_POINTS}}</ul>
    </div>
  </div>
</div>
</body>
</html>
