<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width={{W}}, height={{H}}">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: {{W}}px; height: {{H}}px;
  font-family: {{FONT_TITLE}};
  background: {{BG}};
  color: {{TEXT}};
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
/* large ink wash circle */
.ink {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}
.ink-1 {
  width: 500px; height: 500px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at 40% 35%, rgba(141, 110, 99, 0.04) 0%, transparent 55%);
}
.ink-2 {
  width: 300px; height: 300px;
  top: 15%; right: 8%;
  background: radial-gradient(circle at 50% 50%, rgba(141, 110, 99, 0.02) 0%, transparent 60%);
}
.ink-3 {
  width: 180px; height: 180px;
  bottom: 10%; left: 5%;
  border: 1px solid rgba(141, 110, 99, 0.04);
  background: rgba(141, 110, 99, 0.01);
}
/* vertical bamboo-like line */
.bamboo {
  position: absolute;
  top: 8%; bottom: 8%;
  width: 1px;
  background: linear-gradient(180deg, transparent 5%, rgba(141, 110, 99, 0.06) 20%, rgba(141, 110, 99, 0.06) 80%, transparent 95%);
  pointer-events: none;
}
.bamboo-l { left: 25px; }
.bamboo-r { right: 25px; }
/* red seal */
.seal {
  position: absolute;
  bottom: 30px;
  right: 30px;
  width: 44px; height: 44px;
  background: {{ACCENT}};
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc({{CONTENT_SIZE__PRINT}} * 0.6);
  font-weight: 700;
  color: rgba(255,255,255,0.85);
  font-family: "Noto Serif SC", serif;
  writing-mode: vertical-rl;
  letter-spacing: 0;
}
.container {
  position: relative;
  z-index: 1;
  padding: 36px;
  max-width: 92%;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
/* vertical title for portrait */
.title-vertical {
  font-size: {{TITLE_SIZE_V}};
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: 0.08em;
  color: {{TEXT}};
  margin-bottom: 16px;
  writing-mode: vertical-rl;
  height: auto;
  max-height: 62vh;
  max-width: 90%;
  overflow: hidden;
  align-self: center;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.title-horizontal {
  display: none;
}
.divider {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, {{ACCENT}}, transparent);
  margin-bottom: 12px;
  opacity: 0.4;
}
.content {
  font-family: {{FONT_BODY}};
  font-size: {{CONTENT_SIZE}};
  font-weight: 400;
  line-height: 1.8;
  color: {{SECONDARY}};
  max-width: 92%;
}
.points {
  list-style: none;
  margin-top: 10px;
}
.points li {
  font-family: {{FONT_BODY}};
  font-size: calc({{CONTENT_SIZE}} - 2px);
  font-weight: 400;
  color: {{TEXT}};
  padding: 6px 0 6px 22px;
  position: relative;
  opacity: 0.8;
}
.points li::before {
  content: '·';
  position: absolute;
  left: 0;
  color: {{ACCENT}};
  font-weight: 700;
  font-size: 16px;
  opacity: 0.6;
}
.points:empty { display: none; }
.source {
  position: absolute;
  bottom: 14px;
  left: 36px;
  font-family: {{FONT_BODY}};
  font-size: calc({{CONTENT_SIZE__PRINT}} * 0.55);
  color: {{SECONDARY}};
  opacity: 0.4;
  letter-spacing: 0.1em;
}
/* square: horizontal title */
@media (max-aspect-ratio: 4/5) {
  .title-vertical { display: none; }
  .title-horizontal { display: block; font-size: {{TITLE_SIZE_S}}; font-weight: 600; margin-bottom: 12px; letter-spacing: 0.04em; }
  .container { align-items: flex-start; padding: 28px; }
  .ink-1 { width: 300px; height: 300px; }
}
/* landscape: horizontal title always */
@media (min-aspect-ratio: 5/4) {
  .title-vertical { display: none; }
  .title-horizontal { display: block; font-size: {{TITLE_SIZE_W}}; font-weight: 600; margin-bottom: 10px; letter-spacing: 0.03em; }
  .container { flex-direction: row; flex-wrap: wrap; max-width: 90%; padding: 28px 36px; align-items: center; }
  .content { max-width: 75%; }
  .seal { width: 36px; height: 36px; font-size: 16px; bottom: 16px; right: 16px; }
}
/* very wide: compact */
@media (min-aspect-ratio: 7/3) {
  .title-horizontal { font-size: {{TITLE_SIZE_C}}; margin-bottom: 6px; }
  .container { flex-direction: row; gap: 16px; padding: 16px 36px; }
  .divider { margin-bottom: 6px; }
  .content { max-width: 65%; }
  .ink-1 { width: 220px; height: 220px; }
  .bamboo { display: none; }
}
</style>
</head>
<body>
<div class="ink ink-1"></div>
<div class="ink ink-2"></div>
<div class="ink ink-3"></div>
<div class="bamboo bamboo-l"></div>
<div class="bamboo bamboo-r"></div>
<div class="seal">{{SEAL}}</div>
<div class="container">
  <h1 class="title-vertical">{{TITLE}}</h1>
  <h1 class="title-horizontal">{{TITLE}}</h1>
  <div class="divider"></div>
  <div class="content">{{CONTENT}}</div>
  <ul class="points">{{POINTS_HTML}}</ul>
</div>
<div class="source">{{SOURCE}}</div>
</body>
</html>
